<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-light bg-light sticky-top border-bottom">
        <div class="container-fluid"> 
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="fa-brands fa-instagram fs-4 me-2"></i> 
                <span class="fw-bold">Instagram</span>
            </a>
            <div class="d-flex"> 
                <button type="button" class="btn btn-success me-2" data-bs-toggle="modal" data-bs-target="#createPostModal">
                    Create a new post
                </button>
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="fa-solid fa-gear"></i>
                    </button>
               <ul class="dropdown-menu dropdown-menu-end">
    <li><a class="dropdown-item" href="#">Profile</a></li>
    <li><a class="dropdown-item" href="#">Accessibility</a></li>
    <li><a class="dropdown-item" href="#">Privacy and Data</a></li>
    <li><hr class="dropdown-divider"></li>
    <li><a class="dropdown-item text-danger" href="#">Log out</a></li>
</ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <ul class="nav nav-pills justify-content-center mb-3" id="pills-tab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active text-secondary" id="pills-grid-tab" data-bs-toggle="pill" data-bs-target="#pills-grid" type="button" role="tab">
                    <i class="fa-solid fa-table-cells"></i>
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link text-secondary" id="pills-feed-tab" data-bs-toggle="pill" data-bs-target="#pills-feed" type="button" role="tab">
                    <i class="fa-solid fa-square"></i>
                </button>
            </li>
        </ul>
    </div>

    <div class="tab-content" id="pills-tabContent">
        
        <div class="tab-pane fade show active" id="pills-grid" role="tabpanel">
            <div class="container-fluid px-1">
                <div class="row g-1 mt-1"> 
                    <div class="col-4"><img src="https://picsum.photos/id/10/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/11/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/12/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/13/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/14/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/15/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/16/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/17/500/500" class="img-fluid w-100" alt="post"></div>
                    <div class="col-4"><img src="https://picsum.photos/id/18/500/500" class="img-fluid w-100" alt="post"></div>
                </div> 
            </div> 
        </div>

        <div class="tab-pane fade" id="pills-feed" role="tabpanel">
            <div class="container">
                <div class="row">
                    <div class="col-12 col-md-8 col-lg-6 mx-auto">
                        
                        <div class="card mb-4">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="m-0">Beach Vibes</h5>
                                <small class="text-muted">03/26</small>
                            </div>
                            <img src="https://picsum.photos/id/25/600/400" class="card-img-top" alt="post-image">
                            <div class="card-body">
                                <p class="card-text"><strong>204 Likes</strong></p>
                                <p class="card-text">Foto de cerezos en verano</p>
                            </div>
                        </div>

                        <div class="card mb-4">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="m-0">Office Setup</h5>
                                <small class="text-muted">03/27</small>
                            </div>
                            <img src="https://picsum.photos/id/28/600/400" class="card-img-top" alt="post-image">
                            <div class="card-body">
                                <p class="card-text"><strong>150 Likes</strong></p>
                                <p class="card-text">Encontrando el rio en su punto de salida</p>
                            </div>
                        </div>

                        <div class="card mb-4">
                            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                                <h5 class="m-0">Nature Walk</h5>
                                <small class="text-muted">03/28</small>
                            </div>
                            <img src="https://picsum.photos/id/29/600/400" class="card-img-top" alt="post-image">
                            <div class="card-body">
                                <p class="card-text"><strong>312 Likes</strong></p>
                                <p class="card-text">Cruzando el cielo entre los alpes</p>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createPostModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5" id="exampleModalLabel">Create a new post</h1>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
        <div class="modal-body">
    <div class="mb-3">
        <label for="captionArea" class="form-label fw-bold">Caption:</label>
        <textarea class="form-control" id="captionArea" rows="2" placeholder="Write your caption here..."></textarea>
    </div>

    <div class="d-flex gap-2">
        <button type="button" class="btn btn-light border btn-sm">
            <i class="fa-solid fa-camera"></i>
        </button>
        <button type="button" class="btn btn-light border btn-sm">
            <i class="fa-solid fa-location-dot"></i>
        </button>
    </div>
</div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            <button type="button" class="btn btn-success">Publish</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>    
</body>
</html>
